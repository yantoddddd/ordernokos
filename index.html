<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat Support</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            padding: 20px;
        }
        .chat-container {
            width: 100%; max-width: 500px; background: white;
            border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .chat-header { 
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white; padding: 20px; text-align: center;
        }
        .chat-title { font-size: 20px; font-weight: 600; }
        .status { font-size: 11px; margin-top: 5px; }
        .status.connected { color: #28a745; }
        .status.polling { color: #007bff; }
        .chat-messages { 
            height: 400px; padding: 20px; overflow-y: auto; background: #f8f9fa;
            border-bottom: 1px solid #e1e5e9;
        }
        .message { margin-bottom: 12px; display: flex; animation: fadeIn 0.3s ease-out; }
        .message.user { justify-content: flex-end; }
        .message.admin { justify-content: flex-start; }
        .message-content { 
            max-width: 85%; padding: 10px 14px; border-radius: 16px;
            font-size: 14px;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border-bottom-right-radius: 4px;
        }
        .message.admin .message-content {
            background: white; border: 1px solid #e1e5e9;
            border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .message-time { font-size: 10px; opacity: 0.7; margin-top: 4px; }
        .chat-input-container { padding: 15px; background: white; }
        .chat-input-wrapper { display: flex; gap: 8px; }
        #messageInput { 
            flex: 1; padding: 12px 16px; border: 2px solid #e1e5e9;
            border-radius: 25px; outline: none; font-size: 14px;
        }
        #messageInput:focus { border-color: #28a745; }
        #sendBtn { 
            padding: 12px 18px; background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white; border: none; border-radius: 25px; cursor: pointer;
            font-weight: 500;
        }
        #sendBtn:disabled { opacity: 0.6; cursor: not-allowed; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-title">Live Support</div>
            <div class="status polling" id="connectionStatus">Connecting...</div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div style="text-align: center; color: #666; padding: 30px 0;">
                <div>🔄 Menghubungkan dengan agen...</div>
            </div>
        </div>
        
        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <input type="text" id="messageInput" placeholder="Ketik pesan Anda (Enter=kirim)..." />
                <button id="sendBtn" onclick="sendMessage()">Kirim</button>
            </div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8606015215:AAF0ECEhBqchYwOlgGuwRQD9ggJvhKVYszU';
        const CHAT_ID = '8182530431';
        let currentTicketId = null;
        let lastProcessedMsgId = parseInt(localStorage.getItem('lastMsgId') || '0');
        let pollingTimer = null;

        // Get IP ticket
        async function getVisitorIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return `IP-${data.ip.replace(/\./g, '').slice(-8).toUpperCase()}`;
            } catch {
                return `IP-${Date.now().toString(36).toUpperCase().slice(-8)}`;
            }
        }

        // Generate ticket
        async function generateIPTicket() {
            currentTicketId = await getVisitorIP();
            console.log('🎫 Ticket:', currentTicketId);
            return currentTicketId;
        }

        // FIXED: Send with session check
        async function sendToTelegram(text) {
            try {
                const fullText = `🆔 *${currentTicketId}*\n\n${text}`;
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: fullText,
                        parse_mode: 'Markdown'
                    })
                });
                return response.ok;
            } catch(e) {
                console.error('Send error:', e);
                return false;
            }
        }

        // FIXED: NO DUPLICATES EVER
        async function pollTelegram() {
            if (!currentTicketId) return;
            try {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastProcessedMsgId + 1}&limit=5`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.ok && data.result.length > 0) {
                    for (let update of data.result) {
                        await processTelegramUpdate(update);
                    }
                }
            } catch(e) {
                console.error('Poll error:', e);
            }
        }

        // FIXED: Process with TIME + CONTENT duplicate check
        async function processTelegramUpdate(update) {
            if (update.message?.chat?.id?.toString() !== CHAT_ID) return;
            
            const msgId = update.message.message_id;
            if (msgId <= lastProcessedMsgId) return;
            
            lastProcessedMsgId = Math.max(lastProcessedMsgId, msgId);
            localStorage.setItem('lastMsgId', lastProcessedMsgId); // PERSISTENT
            
            const replyText = update.message.text?.trim();
            if (!replyText) return;
            
            // REPLY DETECTION
            if (update.message.reply_to_message?.from?.is_bot) {
                const repliedText = update.message.reply_to_message.text || '';
                const ticketMatch = repliedText.match(/🆔\s*\*?IP\-([A-Z0-9]{8})\*?/i);
                
                if (ticketMatch && ticketMatch[1] === currentTicketId.slice(3)) {
                    // TRIPLE DUPLICATE CHECK
                    const msgHash = btoa(replyText).slice(0, 15);
                    const now = Date.now();
                    const recentChats = JSON.parse(localStorage.getItem(`chat_${currentTicketId}`) || '[]');
                    
                    // Check if already exists (time + content)
                    const exists = recentChats.some(chat => 
                        chat.sender === 'admin' && 
                        chat.text === replyText && 
                        now - chat.time < 60000 // 1 minute
                    );
                    
                    if (exists) {
                        console.log('⏭️ Duplicate blocked');
                        return;
                    }
                    
                    addMessage(replyText, 'admin');
                    saveMessage(replyText, 'admin');
                    console.log('✅ NEW Reply:', replyText);
                }
            }
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentTicketId) return;
            
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.textContent = 'Mengirim...';
            
            addMessage(text, 'user');
            saveMessage(text, 'user');
            input.value = '';
            
            await sendToTelegram(text);
            
            btn.disabled = false;
            btn.textContent = 'Kirim';
        }

        // Add message
        function addMessage(text, sender) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            const time = new Date().toLocaleTimeString('id-ID', {hour: '2-digit', minute: '2-digit'});
            
            div.innerHTML = `
                <div class="message-content">
                    ${text.replace(/[*_`]/g, '')}
                    <div class="message-time">${time}</div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // FIXED Storage - with timestamp
        function saveMessage(text, sender) {
            const chats = JSON.parse(localStorage.getItem(`chat_${currentTicketId}`) || '[]');
            chats.push({text, sender, time: Date.now()});
            localStorage.setItem(`chat_${currentTicketId}`, JSON.stringify(chats));
        }

        // FIXED Load - skip old messages
        function loadMessages() {
            const saved = localStorage.getItem(`chat_${currentTicketId}`);
            if (saved) {
                const chats = JSON.parse(saved);
                const now = Date.now();
                // Only load recent messages (last 1 hour)
                const recentChats = chats.filter(chat => now - chat.time < 3600000);
                
                recentChats.forEach(msg => addMessage(msg.text, msg.sender));
                console.log(`📦 Loaded ${recentChats.length} recent messages`);
            }
        }

        // INIT
        async function initChat() {
            console.log('🚀 Anti-duplicate chat starting...');
            
            await generateIPTicket();
            loadMessages();
            
            // Welcome
            await sendToTelegram('👋 User ready');
            
            pollingTimer = setInterval(pollTelegram, 2000);
            pollTelegram();
            
            document.getElementById('connectionStatus').textContent = '✅ Live';
            
            setTimeout(() => {
                addMessage('Mulai chat dengan agen sekarang!', 'admin');
            }, 500);
        }

        document.getElementById('messageInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') sendMessage();
        });

        window.addEventListener('load', initChat);
    </script>
</body>
</html>
