<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>Noko Yanto - Saldo Real-time</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:linear-gradient(135deg,#667eea,#764ba2);padding:20px;min-height:100vh}
.box{max-width:500px;margin:auto;background:#fff;border-radius:20px;padding:30px;box-shadow:0 20px 40px rgba(0,0,0,0.2)}
h1{text-align:center;color:#ff6b6b;margin-bottom:25px;font-size:28px}
.balance{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#a0aec0,#cbd5e0);padding:15px;border-radius:12px;margin-bottom:20px;font-size:18px;font-weight:bold}
.balance.low{background:linear-gradient(135deg,#fed7d7,#feb2b2)}
.nominal{font-size:24px;color:#2d3748}
.btn{width:100%;padding:15px;margin:10px 0;border-radius:12px;border:none;font-size:16px;font-weight:bold;cursor:pointer;transition:all 0.3s}
.btn-order{background:linear-gradient(135deg,#48bb78,#38a169);color:white}
.btn-order:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(72,187,120,0.3)}
.btn-buy{background:linear-gradient(135deg,#ed8936,#dd6b20);color:white}
.btn-buy:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(237,137,54,0.3)}
.btn:disabled{background:#a0aec0;cursor:not-allowed;transform:none}
.num{font-size:24px;color:#2d3748;font-weight:bold;text-align:center;margin:20px 0;padding:20px;background:#f7fafc;border-radius:12px;border-left:5px solid #667eea}
.otp{font-size:32px;color:#38a169;background:#c6f6d5;padding:25px;border-radius:15px;text-align:center;margin:20px 0;font-weight:bold;box-shadow:0 5px 15px rgba(56,166,105,0.2)}
.status{padding:15px;border-radius:12px;margin:15px 0;font-weight:bold;text-align:center}
.ok{background:#c6f6d5;color:#22543d;border:1px solid #9ae6b4}
.error{background:#fed7d7;color:#742a2a;border:1px solid #fc8181}
.wait{background:#fef5e7;color:#744210;border:1px solid #f6ad55}
#result,#deposit{display:none}
select{width:100%;padding:15px;margin:10px 0;border-radius:8px;border:1px solid #e2e8f0;font-size:16px}
.autorefresh{text-align:center;color:#4a5568;font-size:14px;margin-top:10px;padding:10px;background:#f7fafc;border-radius:8px}
</style>
</head>
<body>
<div class="box">
<h1>🚀 Noko Yanto Pro</h1>

<!-- SALDO DISPLAY -->
<div id="balance" class="balance" style="display:none">
<span>💰 Saldo Saat Ini:</span>
<span class="nominal" id="saldo">Rp 0</span>
</div>

<!-- DEPOSIT AUTO SHOW -->
<div id="deposit">
<div style="text-align:center;margin-bottom:15px">
<span style="font-size:18px;font-weight:bold;color:#2d3748">💳 Isi Saldo Dulu</span>
</div>
<input type="number" id="nominal" placeholder="Rp 10.000" min="5000" value="10000" style="font-size:18px">
<button class="btn btn-buy" onclick="prosesDeposit()">💳 BAYAR & ISI SALDO</button>
<div id="paymentInfo" style="margin-top:15px;padding:15px;background:#e6fffa;border-radius:10px;display:none;font-size:14px;line-height:1.5"></div>
</div>

<div id="status" class="status" style="display:none"></div>

<select id="operator">
<option value="any">📶 Any (Paling Cepat)</option>
<option value="telkomsel">📶 Telkomsel</option>
<option value="indosat">📶 Indosat</option>
<option value="axis">📶 Axis</option>
<option value="three">📶 3 (Tri)</option>
</select>

<button class="btn btn-order" id="waBtn">🚀 ORDER WHATSAPP (Rp3.000)</button>
<button class="btn btn-order" id="fbBtn" onclick="order('fb')">📘 ORDER FACEBOOK (Rp4.000)</button>

<!-- RESULT -->
<div id="result">
<div class="num" id="phone">+62xxxxxxxxxx</div>
<div id="orderid" style="text-align:center;color:#4a5568;font-size:14px;margin:10px 0">Order ID: Belum ada</div>
<button class="btn btn-order" onclick="checkOTP()" id="checkbtn" disabled>📱 CEK OTP</button>
<button class="btn" onclick="cancel()" id="cancelbtn" disabled style="background:#e53e3e">❌ CANCEL ORDER</button>
<div id="otp" class="otp" style="display:none">123456</div>
<div id="autorefresh" class="autorefresh"></div>
</div>
</div>

<script>
const API='https://api.jasaotp.id/v1/';
const KEY='d2c16800b8aba6bafd60499727a16fa9';
let orderid=null;
let interval=null;

function status(type,msg){
 let el=document.getElementById('status');
 el.innerHTML=msg;
 el.className='status '+type;
 el.style.display='block';
 setTimeout(()=>el.style.display='none',4000);
}

async function updateSaldo(){
 try{
  let res=await fetch(API+'balance.php?api_key='+KEY);
  let data=await res.json();
  
  if(data.success && data.code===200){
   let saldo=data.data.saldo;
   document.getElementById('saldo').innerText='Rp '+saldo.toLocaleString();
   document.getElementById('balance').style.display='block';
   
   // Kontrol UI berdasarkan saldo
   if(saldo>=4000){
    document.getElementById('deposit').style.display='none';
    document.getElementById('waBtn').disabled=false;
    document.getElementById('waBtn').innerText='🚀 ORDER WHATSAPP (Rp3.000)';
    document.getElementById('balance').classList.remove('low');
   }else{
    document.getElementById('deposit').style.display='block';
    document.getElementById('waBtn').disabled=true;
    document.getElementById('waBtn').innerText='💳 SALDO KURANG - ISI DULU!';
    document.getElementById('balance').classList.add('low');
    document.getElementById('nominal').value=Math.max(5000,4000-saldo);
   }
  }
 }catch(e){
  console.error('Saldo error:',e);
 }
}

function prosesDeposit(){
 let nominal=document.getElementById('nominal').value;
 if(!nominal || nominal<5000){
  alert('Minimal Rp 5.000!');
  return;
 }
 
 let info=`✅ <strong>BAYAR Rp ${parseInt(nominal).toLocaleString()}</strong><br><br>`;
 info+=`📱 <strong>KIRIM KE:</strong><br>`;
 info+=`• QRIS: 0812-3456-7890 (JasaOTP ID)<br>`;
 info+=`• BCA: 1234567890 a/n JasaOTP<br>`;
 info+=`• Pulsa: 081234567890 (All Operator)<br><br>`;
 info+=`💬 <strong>KONFIRMASI:</strong><br>`;
 info+=`Wa.me/6281234567890<br><br>`;
 info+=`⏰ Saldo masuk <strong>1-5 menit</strong>`;
 
 document.getElementById('paymentInfo').innerHTML=info;
 document.getElementById('paymentInfo').style.display='block';
 status('ok','💳 Info pembayaran siap!');
 
 // Auto check saldo
 setTimeout(updateSaldo,5000);
 setTimeout(updateSaldo,10000);
}

async function order(service){
 let operator=document.getElementById('operator').value;
 let prices={'wa':3000,'fb':4000};
 let price=prices[service];
 
 let saldoText=document.getElementById('saldo').innerText;
 let saldo=parseInt(saldoText.replace(/[^\d]/g,''));
 
 if(saldo<price){
  document.getElementById('deposit').style.display='block';
  status('error','💳 Saldo kurang Rp'+(price-saldo).toLocaleString());
  return;
 }
 
 status('wait','🚀 Membuat order '+service.toUpperCase()+'...');
 
 try{
  let res=await fetch(`${API}order.php?api_key=${KEY}&negara=6&layanan=${service}&operator=${operator}`);
  let data=await res.json();
  
  if(data.success && data.code===200){
   orderid=data.data.order_id;
   document.getElementById('phone').innerText=data.data.number;
   document.getElementById('orderid').innerText='Order ID: '+orderid;
   document.getElementById('result').style.display='block';
   document.getElementById('checkbtn').disabled=false;
   document.getElementById('cancelbtn').disabled=false;
   status('ok','✅ Order berhasil! '+data.data.number);
   autoCheck();
  }else{
   status('error','❌ '+data.message);
  }
 }catch(e){
  status('error','❌ '+e.message);
 }
}

async function checkOTP(){
 if(!orderid) return;
 try{
  let res=await fetch(`${API}sms.php?api_key=${KEY}&id=${orderid}`);
  let data=await res.json();
  
  if(data.success && data.data.otp){
   document.getElementById('otp').innerText=data.data.otp;
   document.getElementById('otp').style.display='block';
   status('ok','✅ OTP TERIMA: '+data.data.otp);
   if(interval) clearInterval(interval);
  }else{
   status('wait','⏳ OTP dalam proses...');
  }
 }catch(e){
  console.error(e);
 }
}

async function cancel(){
 if(!orderid || !confirm('Yakin cancel order?')) return;
 try{
  let res=await fetch(`${API}cancel.php?api_key=${KEY}&id=${orderid}`);
  let data=await res.json();
  if(data.success){
   status('ok','✅ Order dibatalkan + saldo kembali!');
   reset();
  }
 }catch(e){}
}

function autoCheck(){
 let count=0;
 document.getElementById('autorefresh').innerText='🔄 Auto check OTP setiap 3 detik...';
 interval=setInterval(()=>{
  count++;
  document.getElementById('autorefresh').innerText=`🔄 Auto check #${count}`;
  checkOTP();
 },3000);
}

function reset(){
 orderid=null;
 document.getElementById('result').style.display='none';
 document.getElementById('checkbtn').disabled=true;
 document.getElementById('cancelbtn').disabled=true;
 document.getElementById('otp').style.display='none';
 if(interval) clearInterval(interval);
}

// STARTUP
updateSaldo();
setInterval(updateSaldo,10000); // Update saldo tiap 10 detik
</script>
</body>
</html>
