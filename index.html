<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat Support</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            padding: 20px;
        }
        .chat-container {
            width: 100%; max-width: 450px; background: white;
            border-radius: 24px; box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            overflow: hidden;
        }
        .chat-header { 
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white; padding: 24px 20px; text-align: center;
        }
        .chat-title { 
            font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
        }
        .status { 
            font-size: 12px; margin-top: 8px; opacity: 0.9;
            font-weight: 500;
        }
        .status.connected { color: #28a745; }
        .status.polling { color: #007bff; }
        .chat-messages { 
            height: 450px; padding: 24px 20px; overflow-y: auto; 
            background: linear-gradient(180deg, #f8f9fa 0%, #e9ecef 100%);
        }
        .message { 
            margin-bottom: 16px; display: flex; animation: fadeIn 0.4s ease-out;
        }
        .message.user { justify-content: flex-end; }
        .message.admin { justify-content: flex-start; }
        .message-content { 
            max-width: 85%; padding: 14px 18px; border-radius: 20px;
            font-size: 15px; line-height: 1.4; position: relative;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border-bottom-right-radius: 6px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        .message.admin .message-content {
            background: white; border: 1px solid #e9ecef;
            border-bottom-left-radius: 6px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .message-time { 
            font-size: 11px; opacity: 0.7; margin-top: 6px; font-weight: 400;
        }
        .chat-input-container { 
            padding: 20px; background: white; border-top: 1px solid #f1f3f4;
        }
        .chat-input-wrapper { 
            display: flex; gap: 12px; background: #f8f9fa; 
            padding: 12px 16px; border-radius: 28px; border: 2px solid #e9ecef;
        }
        #messageInput { 
            flex: 1; padding: 0; border: none; background: none;
            font-size: 15px; outline: none; color: #333;
        }
        #messageInput::placeholder { color: #999; }
        #sendBtn { 
            width: 48px; height: 48px; border-radius: 50%;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white; border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; transition: all 0.2s;
        }
        #sendBtn:hover:not(:disabled) { 
            transform: scale(1.05); box-shadow: 0 4px 16px rgba(40, 167, 69, 0.4);
        }
        #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .welcome-msg {
            text-align: center; color: #666; padding: 40px 20px;
            font-size: 15px; line-height: 1.5;
        }
        .welcome-msg strong { color: #28a745; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }
        .status-dot {
            display: inline-block; width: 8px; height: 8px;
            background: currentColor; border-radius: 50%; margin-left: 6px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-title">Live Support</div>
            <div class="status polling" id="connectionStatus">
                Menghubungkan...<span class="status-dot"></span>
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-msg">
                <strong>Sedang menghubungkan dengan agen...</strong><br>
                Ketik pesan Anda untuk memulai chat
            </div>
        </div>
        
        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <input type="text" id="messageInput" 
                       placeholder="Ketik pesan Anda..." />
                <button id="sendBtn" onclick="sendMessage()" title="Kirim">
                    ➤
                </button>
            </div>
        </div>
    </div>

    <script>
        const BOT_TOKEN = '8606015215:AAF0ECEhBqchYwOlgGuwRQD9ggJvhKVYszU';
        const CHAT_ID = '8182530431';
        let currentTicketId = null;
        let lastProcessedMsgId = 0;
        let lastAdminMsgHash = '';
        let userNotified = false; // FIXED: Only notify ONCE
        let pollingTimer = null;

        // Get stable IP hash
        async function getStableIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                // Stable 8-char hash from IP
                return btoa(data.ip).replace(/[^A-Z0-9]/g, '').slice(-8).toUpperCase();
            } catch {
                return 'LOCAL-' + Date.now().toString(36).slice(-6).toUpperCase();
            }
        }

        // Generate ticket
        async function generateTicket() {
            const ipHash = await getStableIP();
            currentTicketId = `CHAT-${ipHash}`;
            return currentTicketId;
        }

        // Send to Telegram - SMART NOTIFICATION
        async function sendToTelegram(text, isNewUser = false) {
            try {
                let fullText = `🆔 *${currentTicketId}*\n\n${text}`;
                
                if (isNewUser && !userNotified) {
                    fullText = `👤 *USER BARU*\n🆔 *Ticket:* \`${currentTicketId}\`\n⏰ *${new Date().toLocaleString('id-ID')}\`\n\n${text}\n\n*REPLY untuk balas user ini*`;
                    userNotified = true; // ONLY ONCE!
                }
                
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                const res = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: fullText,
                        parse_mode: 'Markdown',
                        disable_web_page_preview: true
                    })
                });
                
                return res.ok;
            } catch(e) {
                console.error('TG Error:', e);
                return false;
            }
        }

        // FIXED Polling - NO DUPLICATES
        async function pollTelegram() {
            if (!currentTicketId) return;
            try {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastProcessedMsgId + 1}&limit=3`;
                const res = await fetch(url);
                const data = await res.json();
                
                if (data.ok) {
                    for (let update of data.result) {
                        await processUpdate(update);
                    }
                }
            } catch(e) {
                // Silent fail
            }
        }

        // FIXED Processing - ZERO DUPLICATES
        async function processUpdate(update) {
            const msg = update.message;
            if (!msg || msg.chat.id.toString() !== CHAT_ID) return;
            
            const msgId = msg.message_id;
            if (msgId <= lastProcessedMsgId) return;
            lastProcessedMsgId = msgId;
            
            // ONLY process REPLIES to bot
            if (msg.reply_to_message?.from?.is_bot) {
                const repliedText = msg.reply_to_message.text || '';
                const ticketMatch = repliedText.match(/🆔\s*\*?CHAT\-([A-Z0-9]{8})\*?/i);
                
                if (ticketMatch && ticketMatch[1] === currentTicketId.slice(5)) {
                    const replyText = msg.text?.trim() || '[Foto/Sticker]';
                    const msgHash = btoa(replyText).slice(0, 16);
                    
                    // PERFECT DUPLICATE PREVENTION
                    if (msgHash === lastAdminMsgHash) return;
                    lastAdminMsgHash = msgHash;
                    
                    addMessage(replyText, 'admin');
                    saveMessage(replyText, 'admin');
                }
            }
        }

        // Send message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;
            
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            
            addMessage(text, 'user');
            saveMessage(text, 'user');
            input.value = '';
            
            const isNewUser = !userNotified;
            await sendToTelegram(text, isNewUser);
            
            btn.disabled = false;
        }

        // UI Message
        function addMessage(text, sender) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            const time = new Date().toLocaleTimeString('id-ID', {
                hour: '2-digit', minute: '2-digit'
            });
            
            div.innerHTML = `
                <div class="message-content">
                    ${text.replace(/[*_`]/g, '')}
                    <div class="message-time">${time}</div>
                </div>
            `;
            
            // Clear welcome if first message
            if (container.children[0]?.classList.contains('welcome-msg')) {
                container.innerHTML = '';
            }
            
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // LocalStorage
        function saveMessage(text, sender) {
            const chats = JSON.parse(localStorage.getItem(`chat_${currentTicketId}`) || '[]');
            chats.push({text, sender, time: Date.now()});
            localStorage.setItem(`chat_${currentTicketId}`, JSON.stringify(chats));
        }

        function loadMessages() {
            const saved = localStorage.getItem(`chat_${currentTicketId}`);
            if (saved) {
                JSON.parse(saved).forEach(msg => addMessage(msg.text, msg.sender));
            }
        }

        // Status
        function updateStatus(status, text) {
            const el = document.getElementById('connectionStatus');
            el.textContent = text || (status === 'polling' ? 'Menunggu balasan...' : 'Terhubung');
            el.className = `status ${status}`;
        }

        // INIT - PERFECT AUTO-START
        async function init() {
            await generateTicket();
            loadMessages();
            
            // First notification ONLY ONCE per session
            if (!localStorage.getItem(`notified_${currentTicketId}`)) {
                await sendToTelegram('👋 User baru online');
                localStorage.setItem(`notified_${currentTicketId}`, 'true');
            }
            
            // Start polling
            pollingTimer = setInterval(pollTelegram, 1500);
            pollTelegram();
            
            updateStatus('polling', 'Menunggu balasan agen...');
            
            // Auto-welcome after 1s
            setTimeout(() => {
                if (document.querySelectorAll('.message').length === 0) {
                    addMessage('Agen akan segera merespon pesan Anda', 'admin');
                }
            }, 1000);
        }

        // Events
        document.getElementById('messageInput').addEventListener('keypress', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Auto start
        window.addEventListener('load', init);
        window.addEventListener('beforeunload', () => {
            if (pollingTimer) clearInterval(pollingTimer);
        });
    </script>
</body>
</html>
