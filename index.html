<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat - WORKING REPLY</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .chat-container{width:100%;max-width:450px;background:white;border-radius:24px;box-shadow:0 25px 50px rgba(0,0,0,.15);overflow:hidden}
        .chat-header{background:linear-gradient(135deg,#28a745 0%,#20c997 100%);color:white;padding:24px 20px;text-align:center}
        .chat-title{font-size:22px;font-weight:700}
        .status{font-size:12px;margin-top:8px;opacity:.9;font-weight:500}
        .status-dot{display:inline-block;width:8px;height:8px;background:currentColor;border-radius:50%;margin-left:6px;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .chat-messages{height:450px;padding:24px 20px;overflow-y:auto;background:linear-gradient(180deg,#f8f9fa 0%,#e9ecef 100%)}
        .message{margin-bottom:16px;display:flex;animation:fadeIn .4s ease-out}
        .message.user{justify-content:flex-end}
        .message.admin{justify-content:flex-start}
        .message-content{max-width:85%;padding:14px 18px;border-radius:20px;font-size:15px;line-height:1.4}
        .message.user .message-content{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border-bottom-right-radius:6px;box-shadow:0 4px 12px rgba(102,126,234,.3)}
        .message.admin .message-content{background:white;border:1px solid #e9ecef;border-bottom-left-radius:6px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
        .message-time{font-size:11px;opacity:.7;margin-top:6px;font-weight:400}
        .chat-input-container{padding:20px;background:white;border-top:1px solid #f1f3f4}
        .chat-input-wrapper{display:flex;gap:12px;background:#f8f9fa;padding:12px 16px;border-radius:28px;border:2px solid #e9ecef}
        #messageInput{flex:1;padding:0;border:none;background:none;font-size:15px;outline:none;color:#333}
        #messageInput::placeholder{color:#999}
        #sendBtn{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#28a745 0%,#20c997 100%);color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s}
        #sendBtn:hover:not(:disabled){transform:scale(1.05);box-shadow:0 4px 16px rgba(40,167,69,.4)}
        #sendBtn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .welcome-msg{text-align:center;color:#666;padding:40px 20px;font-size:15px;line-height:1.5}
        @keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
        #debug{position:fixed;bottom:10px;right:10px;background:rgba(0,0,0,.9);color:lime;padding:10px;border-radius:8px;font-size:12px;max-width:300px;max-height:200px;overflow:auto;z-index:9999;display:none}
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-title">Live Support</div>
            <div class="status polling" id="connectionStatus">Menghubungkan...<span class="status-dot"></span></div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-msg"><strong>Sedang menghubungkan...</strong><br>Ketik pesan untuk mulai chat</div>
        </div>
        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <input type="text" id="messageInput" placeholder="Ketik pesan Anda...">
                <button id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
    <div id="debug"></div>

    <script>
        const BOT_TOKEN = '8606015215:AAF0ECEhBqchYwOlgGuwRQD9ggJvhKVYszU';
        const CHAT_ID = '8182530431';
        let currentTicketId = '';
        let lastUpdateId = 0;
        let lastReplyTime = 0;
        let pollingInterval = null;

        function debug(msg) {
            console.log(msg);
            const d = document.getElementById('debug');
            d.style.display = 'block';
            d.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
            d.scrollTop = d.scrollHeight;
            setTimeout(()=>d.style.display='none',10000);
        }

        // Generate ticket - SIMPLIFIED
        async function generateTicket() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const ip = await res.json();
                currentTicketId = `ID${ip.ip.replace(/\./g,'').slice(-6)}`;
            } catch {
                currentTicketId = `ID${Date.now().toString(36).slice(-6).toUpperCase()}`;
            }
            debug(`🎫 Ticket: ${currentTicketId}`);
            document.getElementById('connectionStatus').innerHTML = `Ticket ${currentTicketId.slice(0,4)}... <span class="status-dot"></span>`;
            return currentTicketId;
        }

        // Send user message
        async function sendToTelegram(text) {
            const msg = `🆔 ${currentTicketId}\n\n${text}`;
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: msg,
                        parse_mode: 'Markdown'
                    })
                });
                const data = await res.json();
                debug(`📤 User msg: ${data.ok ? '✅' : data.description}`);
                return data.ok;
            } catch(e) {
                debug(`❌ Send error: ${e.message}`);
                return false;
            }
        }

        // FIXED: ULTRA SIMPLE REPLY DETECTION
        async function pollTelegram() {
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}`);
                const data = await res.json();
                
                if (data.ok && data.result.length) {
                    for (let update of data.result) {
                        lastUpdateId = update.update_id;
                        const msg = update.message;
                        
                        if (msg && msg.chat.id.toString() === CHAT_ID && msg.text) {
                            const text = msg.text;
                            debug(`📥 Raw: ${text.substring(0,100)}`);
                            
                            // ANY MESSAGE containing ticket ID = REPLY
                            if (text.includes(currentTicketId)) {
                                // Anti-duplicate
                                if (Date.now() - lastReplyTime < 1500) continue;
                                lastReplyTime = Date.now();
                                
                                // Extract reply text (after ticket)
                                const replyText = text.split(currentTicketId)[1]?.trim() || text;
                                const cleanText = replyText.replace(/🆔.*?\n/gi, '').trim();
                                
                                if (cleanText) {
                                    addMessage(cleanText, 'admin');
                                    saveMessage(cleanText, 'admin');
                                    debug(`✅ REPLY: ${cleanText}`);
                                }
                            }
                        }
                    }
                }
            } catch(e) {
                debug(`Poll error: ${e.message}`);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentTicketId) return;
            
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            
            addMessage(text, 'user');
            saveMessage(text, 'user');
            input.value = '';
            
            await sendToTelegram(text);
            btn.disabled = false;
        }

        function addMessage(text, sender) {
            const container = document.getElementById('chatMessages');
            if (container.children[0]?.classList.contains('welcome-msg')) {
                container.innerHTML = '';
            }
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            const time = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
            div.innerHTML = `<div class="message-content">${text.replace(/[*_`]/g,'')}<div class="message-time">${time}</div></div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function saveMessage(text, sender) {
            const chats = JSON.parse(localStorage.getItem(`chat_${currentTicketId}`)||'[]');
            chats.push({text,sender,time:Date.now()});
            localStorage.setItem(`chat_${currentTicketId}`,JSON.stringify(chats));
        }

        function loadMessages() {
            const saved = localStorage.getItem(`chat_${currentTicketId}`);
            if (saved) JSON.parse(saved).forEach(msg=>addMessage(msg.text,msg.sender));
        }

        async function init() {
            debug('🚀 Starting...');
            await generateTicket();
            loadMessages();
            
            // Send welcome
            await sendToTelegram('👋 Siap chat');
            
            // Start polling every 1s
            pollingInterval = setInterval(pollTelegram, 1000);
            pollTelegram(); // First poll
            
            document.getElementById('connectionStatus').innerHTML = 'Online<span class="status-dot"></span>';
            debug('✅ READY!');
        }

        document.getElementById('messageInput').addEventListener('keypress',e=>{
            if (e.key==='Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        window.addEventListener('load',init);
    </script>
</body>
</html>
