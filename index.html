<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat - FINAL FIX</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
        .chat-container{width:100%;max-width:450px;background:white;border-radius:24px;box-shadow:0 25px 50px rgba(0,0,0,.15);overflow:hidden}
        .chat-header{background:linear-gradient(135deg,#28a745 0%,#20c997 100%);color:white;padding:24px 20px;text-align:center}
        .chat-title{font-size:22px;font-weight:700}
        .status{font-size:12px;margin-top:8px;opacity:.9;font-weight:500}
        .status-dot{display:inline-block;width:8px;height:8px;background:currentColor;border-radius:50%;margin-left:6px;animation:pulse 2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
        .chat-messages{height:450px;padding:24px 20px;overflow-y:auto;background:linear-gradient(180deg,#f8f9fa 0%,#e9ecef 100%)}
        .message{margin-bottom:16px;display:flex;animation:fadeIn .4s ease-out}
        .message.user{justify-content:flex-end}
        .message.admin{justify-content:flex-start}
        .message-content{max-width:85%;padding:14px 18px;border-radius:20px;font-size:15px;line-height:1.4;box-shadow:0 2px 8px rgba(0,0,0,.1)}
        .message.user .message-content{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;border-bottom-right-radius:6px}
        .message.admin .message-content{background:#fff;border:1px solid #e9ecef;border-bottom-left-radius:6px}
        .message-time{font-size:11px;opacity:.7;margin-top:6px;font-weight:400}
        .chat-input-container{padding:20px;background:white;border-top:1px solid #f1f3f4}
        .chat-input-wrapper{display:flex;gap:12px;background:#f8f9fa;padding:12px 16px;border-radius:28px;border:2px solid #e9ecef}
        #messageInput{flex:1;padding:0;border:none;background:none;font-size:15px;outline:none;color:#333}
        #messageInput::placeholder{color:#999}
        #sendBtn{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#28a745 0%,#20c997 100%);color:white;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s}
        #sendBtn:hover:not(:disabled){transform:scale(1.05);box-shadow:0 4px 16px rgba(40,167,69,.4)}
        #sendBtn:disabled{opacity:.5;cursor:not-allowed;transform:none}
        .welcome-msg{text-align:center;color:#666;padding:40px 20px;font-size:15px;line-height:1.5}
        @keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}
        #debug{position:fixed;bottom:10px;right:10px;background:rgba(0,0,0,.9);color:#0f0;padding:12px;border-radius:8px;font-family:monospace;font-size:11px;max-width:350px;max-height:250px;overflow:auto;z-index:9999;opacity:0;transition:opacity .3s}
        #debug.show{opacity:1}
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-title">Live Support</div>
            <div class="status polling" id="connectionStatus">Menghubungkan...<span class="status-dot"></span></div>
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="welcome-msg"><strong>Agen online</strong><br>Ketik pesan untuk chat</div>
        </div>
        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <input type="text" id="messageInput" placeholder="Mulai chat...">
                <button id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>
    <div id="debug"></div>

    <script>
        const BOT_TOKEN = '8606015215:AAF0ECEhBqchYwOlgGuwRQD9ggJvhKVYszU';
        const CHAT_ID = '8182530431';
        let currentTicketId = '';
        let lastUpdateId = 0;
        let lastReplyTime = 0;
        let pollingInterval = null;

        const debugEl = document.getElementById('debug');
        function debug(msg, showChat=false) {
            console.log(msg);
            debugEl.innerHTML += `[${new Date().toLocaleTimeString()}] ${msg}<br>`;
            debugEl.scrollTop = debugEl.scrollHeight;
            debugEl.classList.add('show');
            setTimeout(()=>debugEl.classList.remove('show'),15000);
            
            if (showChat) {
                // Force scroll
                const chat = document.getElementById('chatMessages');
                chat.scrollTop = chat.scrollHeight;
            }
        }

        async function generateTicket() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const ip = await res.json();
                currentTicketId = `T${ip.ip.replace(/[^0-9]/g,'').slice(-6)}`;
            } catch(e) {
                currentTicketId = `T${Math.random().toString(36).substr(2,6).toUpperCase()}`;
            }
            debug(`🎫 NEW TICKET: ${currentTicketId}`);
            return currentTicketId;
        }

        async function sendToTelegram(text) {
            const msg = `🆔 ${currentTicketId}\n\n${text}`;
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: msg,
                        parse_mode: 'HTML'
                    })
                });
                const data = await res.json();
                debug(`📤 SENT → ${data.ok ? '✅ OK' : '❌ ' + data.description}`);
                return data.ok;
            } catch(e) {
                debug(`❌ SEND FAIL: ${e.message}`);
                return false;
            }
        }

        // FIXED: SIMPLEST REPLY DETECTION EVER
        async function pollTelegram() {
            try {
                const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&limit=5`);
                const data = await res.json();
                
                if (data.ok && data.result.length) {
                    for (let update of data.result) {
                        lastUpdateId = update.update_id;
                        const msg = update.message;
                        
                        if (msg?.chat?.id?.toString() === CHAT_ID && msg.text) {
                            const text = msg.text;
                            debug(`📥 GOT: "${text.substring(0,80)}..."`);
                            
                            // CRITICAL FIX: ANY text containing ticket = reply
                            if (text.includes(currentTicketId)) {
                                if (Date.now() - lastReplyTime < 1000) {
                                    debug('⏭️ Duplicate skip');
                                    continue;
                                }
                                lastReplyTime = Date.now();
                                
                                // FIXED: Extract EVERYTHING after ticket
                                let replyText = text;
                                const ticketPos = text.indexOf(currentTicketId);
                                if (ticketPos !== -1) {
                                    replyText = text.slice(ticketPos + currentTicketId.length).trim();
                                }
                                
                                // Clean up common patterns
                                replyText = replyText
                                    .replace(/🆔.*?\n/gi, '')
                                    .replace(/T\d{6}.*?\n/gi, '')
                                    .replace(/\n\n+/g, '\n')
                                    .trim();
                                
                                if (replyText && replyText.length > 0) {
                                    debug(`🎉 ADDING TO CHAT: "${replyText}"`, true);
                                    addMessage(replyText, 'admin');
                                    saveMessage(replyText, 'admin');
                                } else {
                                    debug('⚠️ Empty reply text');
                                }
                            }
                        }
                    }
                }
            } catch(e) {
                debug(`❌ POLL: ${e.message}`);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentTicketId) return;
            
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.textContent = '⏳';
            
            addMessage(text, 'user');
            saveMessage(text, 'user');
            input.value = '';
            
            const ok = await sendToTelegram(text);
            debug(`User "${text}" → Telegram: ${ok ? '✅' : '❌'}`);
            
            btn.disabled = false;
            btn.textContent = '➤';
        }

        function addMessage(text, sender) {
            const container = document.getElementById('chatMessages');
            if (container.children[0]?.classList.contains('welcome-msg')) {
                container.innerHTML = '';
            }
            
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            const time = new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});
            div.innerHTML = `<div class="message-content">${text.replace(/[*_`]/g,'')}<div class="message-time">${time}</div></div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            
            // Visual feedback
            div.style.transform = 'scale(0.95)';
            setTimeout(()=>div.style.transform = 'scale(1)', 200);
        }

        function saveMessage(text, sender) {
            try {
                const chats = JSON.parse(localStorage.getItem(`chat_${currentTicketId}`)||'[]');
                chats.push({text, sender, time: Date.now()});
                localStorage.setItem(`chat_${currentTicketId}`, JSON.stringify(chats));
            } catch(e) {
                debug(`Storage error: ${e.message}`);
            }
        }

        function loadMessages() {
            try {
                const saved = localStorage.getItem(`chat_${currentTicketId}`);
                if (saved) {
                    JSON.parse(saved).forEach(msg => addMessage(msg.text, msg.sender));
                }
            } catch(e) {
                debug(`Load error: ${e.message}`);
            }
        }

        async function init() {
            debug('🔥 LIVE CHAT STARTING...');
            await generateTicket();
            loadMessages();
            
            // Welcome message
            await sendToTelegram('👋 Online');
            
            // Poll every 800ms
            pollingInterval = setInterval(pollTelegram, 800);
            await pollTelegram();
            
            document.getElementById('connectionStatus').innerHTML = 'Live<span class="status-dot"></span>';
            debug('✅ FULLY READY!');
        }

        document.getElementById('messageInput').addEventListener('keypress', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // DEBUG BUTTON - klik 5x untuk toggle debug
        let debugClicks = 0;
        document.addEventListener('click', () => {
            debugClicks++;
            if (debugClicks === 5) {
                debugEl.classList.add('show');
                debugClicks = 0;
            }
        });

        window.addEventListener('load', init);
    </script>
</body>
</html>
