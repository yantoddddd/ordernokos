<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width">
<title>Noko Yanto Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif}
body{background:#667eea;padding:20px}
.box{max-width:500px;margin:auto;background:#fff;border-radius:15px;padding:25px;box-shadow:0 10px 30px rgba(0,0,0,0.2)}
h1{text-align:center;color:#ff6b6b;margin-bottom:20px;font-size:24px}
select,.btn{width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #ddd;font-size:16px}
.btn{background:#667eea;color:white;border:none;cursor:pointer;font-weight:bold;font-size:16px}
.btn:hover{background:#5a67d8}
.btn:disabled{background:#ccc;cursor:not-allowed}
.btn.deposit{background:#48bb78}
.btn.deposit:hover{background:#38a169}
.num{font-size:22px;color:#667eea;font-weight:bold;text-align:center;margin:15px 0;padding:15px;background:#f0f8ff;border-radius:8px}
.otp{font-size:30px;color:#e53e3e;background:#fed7d7;padding:20px;border-radius:10px;text-align:center;margin:15px 0;font-weight:bold}
.status{padding:12px;border-radius:8px;margin:10px 0;font-weight:bold}
.ok{background:#c6f6d5;color:#22543d;border:1px solid #9ae6b4}
.error{background:#fed7d7;color:#742a2a;border:1px solid #fc8181}
.wait{background:#fef5e7;color:#744210;border:1px solid #f6ad55}
.balance{background:#bee3f8;padding:12px;border-radius:8px;text-align:center;margin-bottom:15px}
.low-balance{background:#fed7d7;color:#742a2a;border:1px solid #fc8181;padding:12px;border-radius:8px;margin-bottom:15px;text-align:center}
#result{display:none}
</style>
</head>
<body>
<div class="box">
<h1>🚀 Noko Yanto Pro</h1>

<div id="depositAlert" class="low-balance" style="display:none">
⚠️ <strong>Saldo 0!</strong> <a href="https://jasaotp.id/deposit" target="_blank" class="btn deposit" style="margin-top:10px;display:inline-block;width:auto;padding:8px 16px;font-size:14px">💳 DEPOSIT SEKARANG</a>
</div>

<div id="balance" class="balance" style="display:none">💰 Saldo: Rp <span id="saldo">0</span></div>
<div id="status" class="status" style="display:none"></div>

<select id="operator">
<option value="any">📶 Any (Recommended)</option>
<option value="telkomsel">📶 Telkomsel</option>
<option value="indosat">📶 Indosat</option>
<option value="axis">📶 Axis</option>
<option value="three">📶 Three</option>
</select>

<button class="btn" id="waBtn" onclick="order('wa')">🚀 ORDER WA (Rp3000)</button>
<button class="btn" onclick="order('fb')">📘 ORDER FB (Rp4000)</button>

<div id="result">
<div class="num" id="phone">-</div>
<div id="orderid" style="text-align:center;color:#666;font-size:14px;margin:10px 0">Order ID: -</div>
<button class="btn" onclick="checkOTP()" id="checkbtn" disabled>📱 CEK OTP</button>
<button class="btn" onclick="cancel()" id="cancelbtn" disabled style="background:#e53e3e">❌ CANCEL</button>
<div id="otp" class="otp" style="display:none">-</div>
<div id="autorefresh" style="text-align:center;color:#666;font-size:12px"></div>
</div>

<div style="text-align:center;margin-top:20px;font-size:12px;color:#666">
<a href="https://jasaotp.id" target="_blank">jasaotp.id</a> | API Key: d2c16800b8aba6bafd60499727a16fa9
</div>
</div>

<script>
const API='https://api.jasaotp.id/v1/';
const KEY='d2c16800b8aba6bafd60499727a16fa9';
let orderid=null;
let interval=null;

async function status(t,m){
 document.getElementById('status').innerHTML=m;
 document.getElementById('status').className='status '+t;
 document.getElementById('status').style.display='block';
 setTimeout(()=>document.getElementById('status').style.display='none',3000);
}

async function saldo(){
 try{
  let r=await fetch(API+'balance.php?api_key='+KEY);
  let d=await r.json();
  if(d.success){
   let s=d.data.saldo;
   document.getElementById('saldo').innerText=s.toLocaleString();
   document.getElementById('balance').style.display='block';
   
   // Cek saldo rendah
   if(s<3000){
    document.getElementById('depositAlert').style.display='block';
    document.getElementById('waBtn').disabled=true;
    document.getElementById('waBtn').innerText='🚫 SALDO KURANG - DEPOSIT!';
   }else{
    document.getElementById('depositAlert').style.display='none';
    document.getElementById('waBtn').disabled=false;
    document.getElementById('waBtn').innerText='🚀 ORDER WA (Rp3000)';
   }
  }
 }catch(e){console.error(e);}
}

async function order(svc){
 let op=document.getElementById('operator').value;
 let minPrice=svc=='wa'?3000:4000;
 
 // Double check saldo
 let saldoEl=document.getElementById('saldo');
 if(!saldoEl.innerText || parseInt(saldoEl.innerText.replace(/[^\d]/g,''))<minPrice){
  status('error','💳 Saldo kurang! Deposit dulu');
  return;
 }
 
 status('wait','⏳ Order '+svc.toUpperCase()+'...');
 try{
  let r=await fetch(API+'order.php?api_key='+KEY+'&negara=6&layanan='+svc+'&operator='+op);
  let d=await r.json();
  console.log('Order:',d);
  
  if(d.success){
   orderid=d.data.order_id;
   document.getElementById('phone').innerText=d.data.number;
   document.getElementById('orderid').innerText='Order ID: '+orderid;
   document.getElementById('result').style.display='block';
   document.getElementById('checkbtn').disabled=false;
   document.getElementById('cancelbtn').disabled=false;
   status('ok','✅ Order berhasil! No: '+d.data.number);
   autoCheck();
   saldo(); // Refresh saldo
  }else{
   status('error','❌ '+ (d.message || 'Order gagal'));
  }
 }catch(e){
  status('error','❌ '+e.message);
 }
}

async function checkOTP(){
 if(!orderid)return;
 try{
  let r=await fetch(API+'sms.php?api_key='+KEY+'&id='+orderid);
  let d=await r.json();
  console.log('OTP:',d);
  
  if(d.success && d.data.otp){
   document.getElementById('otp').innerText=d.data.otp;
   document.getElementById('otp').style.display='block';
   status('ok','✅ OTP: '+d.data.otp);
   clearInterval(interval);
   document.getElementById('autorefresh').innerText='✅ Auto check selesai';
  }else{
   status('wait','⏳ Tunggu OTP...');
  }
 }catch(e){
  console.error(e);
 }
}

async function cancel(){
 if(!orderid || !confirm('Yakin cancel? Saldo akan balik'))return;
 try{
  let r=await fetch(API+'cancel.php?api_key='+KEY+'&id='+orderid);
  let d=await r.json();
  if(d.success){
   status('ok','✅ Cancel + refund OK!');
   reset();
   saldo();
  }
 }catch(e){console.error(e);}
}

function autoCheck(){
 let c=0;
 document.getElementById('autorefresh').innerText='🔄 Auto check setiap 3 detik...';
 interval=setInterval(()=>{
  c++;
  document.getElementById('autorefresh').innerText='🔄 Check ke-'+c;
  checkOTP();
 },3000);
}

function reset(){
 orderid=null;
 document.getElementById('result').style.display='none';
 document.getElementById('checkbtn').disabled=true;
 document.getElementById('cancelbtn').disabled=true;
 if(interval)clearInterval(interval);
 document.getElementById('otp').style.display='none';
}

// START
saldo();
setInterval(saldo,30000); // Auto refresh saldo tiap 30 detik
</script>
</body>
</html>
