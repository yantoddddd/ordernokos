<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat Yanto</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
 font-family:'Segoe UI',sans-serif;
 background:radial-gradient(circle,#0f0f1a,#050507);
 display:flex;justify-content:center;align-items:center;
 height:100vh;color:#e0e0ff;
}

.chat{
 width:100%;max-width:420px;
 background:rgba(15,15,30,.95);
 border-radius:18px;
 border:1px solid rgba(0,255,255,.2);
 box-shadow:0 0 30px rgba(0,255,255,.15);
 overflow:hidden;
}

.header{
 background:linear-gradient(135deg,#0ff,#8a2be2);
 color:#000;padding:15px;text-align:center;
 font-weight:bold;
}

.status{font-size:11px;margin-top:4px}

.msgs{
 height:380px;
 overflow-y:auto;
 padding:15px;
}

.msg{display:flex;margin-bottom:10px}
.user{justify-content:flex-end}
.admin{justify-content:flex-start}

.bubble{
 padding:10px 14px;
 border-radius:14px;
 max-width:80%;
 font-size:13px;
}

.user .bubble{
 background:linear-gradient(135deg,#00f0ff,#8a2be2);
 color:#000;
}

.admin .bubble{
 background:rgba(255,255,255,.05);
 border:1px solid rgba(0,255,255,.2);
}

.typing{
 font-size:11px;
 opacity:.6;
 margin:5px;
}

.input{
 display:flex;
 padding:10px;
 gap:6px;
}

input{
 flex:1;
 padding:10px;
 border-radius:20px;
 border:1px solid rgba(0,255,255,.2);
 background:#000;
 color:#fff;
}

button{
 padding:10px 14px;
 border:none;
 border-radius:20px;
 background:#0ff;
 cursor:pointer;
}

button:disabled{opacity:.5}
</style>
</head>

<body>

<div class="chat">
<div class="header">
 LIVE CHAT
 <div class="status" id="status">YANTO</div>
</div>

<div class="msgs" id="msgs"></div>
<div id="typing" class="typing"></div>

<div class="input">
<input id="text" placeholder="Ketik pesan...">
<button id="btn">Kirim</button>
</div>
</div>

<audio id="notif" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>

<script>
const BOT_TOKEN='8606015215:AAF0ECEhBqchYwOlgGuwRQD9ggJvhKVYszU';
const CHAT_ID='8182530431';

let ticket = localStorage.ticket || ("IP-"+Math.random().toString(36).slice(2,8).toUpperCase());
localStorage.ticket = ticket;

let lastId = +localStorage.lastId || 0;
let shown = new Set(JSON.parse(localStorage.shown || "[]"));

// load chat lama
function load(){
 let data = JSON.parse(localStorage.chat || "[]");
 data.forEach(m=>add(m.text,m.type,false));
}

// simpan chat
function save(text,type){
 let data = JSON.parse(localStorage.chat || "[]");
 data.push({text,type});
 localStorage.chat = JSON.stringify(data.slice(-50));
}

// tampilkan
function add(text,type,saveIt=true){
 let d=document.createElement('div');
 d.className='msg '+type;
 d.innerHTML=`<div class="bubble">${text}</div>`;
 msgs.appendChild(d);
 msgs.scrollTop=99999;
 if(saveIt) save(text,type);
}

// kirim
async function send(){
 let t=text.value.trim();
 if(!t)return;

 btn.disabled=true;

 add(t,'user');
 text.value='';

 await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`,{
  method:'POST',
  headers:{'Content-Type':'application/json'},
  body:JSON.stringify({
   chat_id:CHAT_ID,
   text:````ID : ${ticket}\n${t}````
  })
 });

 btn.disabled=false;
}

// typing fake
function typingOn(){
 typing.innerText="Typing..";
}
function typingOff(){
 typing.innerText="";
}

// polling
async function poll(){
 try{
  let r=await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/getUpdates`);
  let d=await r.json();

  status.innerText="ONLINE";

  d.result.forEach(u=>{
   let m=u.message;
   if(!m||m.chat.id!=CHAT_ID) return;

   if(m.message_id<=lastId) return;
   lastId=m.message_id;
   localStorage.lastId=lastId;

   if(!m.reply_to_message?.text?.includes(ticket)) return;

   if(shown.has(m.message_id)) return;
   shown.add(m.message_id);
   localStorage.shown=JSON.stringify([...shown]);

   typingOn();

   setTimeout(()=>{
    typingOff();
    add(m.text,'admin');
    document.getElementById('notif').play();
   },800);
  });

 }catch{
  status.innerText="RECONNECTING...";
 }
}

load();
setInterval(poll,2000);

btn.onclick=send;
text.addEventListener('keypress',e=>{if(e.key==='Enter')send()});
</script>

</body>
</html>
