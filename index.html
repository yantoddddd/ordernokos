<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Chat - IP Ticket System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            padding: 20px;
        }
        .chat-container {
            width: 100%; max-width: 500px; background: white;
            border-radius: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .chat-header { 
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white; padding: 20px; text-align: center;
        }
        .chat-id { 
            font-size: 12px; opacity: 0.9; margin-bottom: 5px; 
            word-break: break-all; font-family: monospace;
        }
        .chat-title { font-size: 20px; font-weight: 600; }
        .status { font-size: 11px; margin-top: 5px; }
        .status.connected { color: #28a745; }
        .status.polling { color: #007bff; }
        .chat-messages { 
            height: 400px; padding: 20px; overflow-y: auto; background: #f8f9fa;
            border-bottom: 1px solid #e1e5e9;
        }
        .message { margin-bottom: 12px; display: flex; }
        .message.user { justify-content: flex-end; }
        .message.admin { justify-content: flex-start; }
        .message-content { 
            max-width: 85%; padding: 10px 14px; border-radius: 16px;
            font-size: 14px;
        }
        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border-bottom-right-radius: 4px;
        }
        .message.admin .message-content {
            background: white; border: 1px solid #e1e5e9;
            border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .message-time { font-size: 10px; opacity: 0.7; margin-top: 4px; }
        .chat-input-container { 
            padding: 15px; background: white; 
        }
        .chat-input-wrapper { display: flex; gap: 8px; }
        #messageInput { 
            flex: 1; padding: 12px 16px; border: 2px solid #e1e5e9;
            border-radius: 25px; outline: none; font-size: 14px;
        }
        #messageInput:focus { border-color: #28a745; }
        #sendBtn { 
            padding: 12px 18px; background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white; border: none; border-radius: 25px; cursor: pointer;
            font-weight: 500;
        }
        #sendBtn:disabled { opacity: 0.6; cursor: not-allowed; }
        .ticket-info {
            background: #e8f5e8; border: 1px solid #28a745; 
            padding: 12px; border-radius: 10px; margin: 15px; text-align: center;
            font-size: 13px;
        }
        .ip-info { 
            background: #e3f2fd; border: 1px solid #2196f3; 
            padding: 8px; border-radius: 6px; font-size: 12px; margin: 5px 0;
            font-family: monospace;
        }
        .telegram-guide {
            background: #fff3cd; border: 1px solid #ffc107; 
            padding: 12px; border-radius: 8px; margin: 10px; font-size: 12px;
        }
        .debug { 
            position: fixed; top: 10px; right: 10px; 
            background: rgba(0,0,0,0.8); color: lime; padding: 10px;
            font-size: 11px; border-radius: 5px; max-width: 300px;
            z-index: 9999; display: none;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message { animation: fadeIn 0.3s ease-out; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-id" id="currentTicketId">Loading...</div>
            <div class="chat-title">Live Support Agent</div>
            <div class="status polling" id="connectionStatus">Memuat...</div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div style="text-align: center; color: #666; padding: 30px 0;">
                <div>🔄 Menghasilkan Ticket ID dari IP Anda...</div>
            </div>
        </div>
        
        <div class="chat-input-container">
            <div class="chat-input-wrapper">
                <input type="text" id="messageInput" placeholder="Ketik pesan Anda (Enter untuk kirim)..." />
                <button id="sendBtn" onclick="sendMessage()">Kirim</button>
            </div>
        </div>
    </div>

    <div class="debug" id="debugLog"></div>

    <script>
        const BOT_TOKEN = '8606015215:AAF0ECEhBqchYwOlgGuwRQD9ggJvhKVYszU';
        const CHAT_ID = '8182530431';
        let currentTicketId = null;
        let lastProcessedMsgId = 0;
        let pollingTimer = null;
        let lastAdminMsgHash = '';

        // Get IP-based ticket
        async function getVisitorIP() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                return data.ip.replace(/\./g, '').slice(-8).toUpperCase();
            } catch {
                return Date.now().toString(36).toUpperCase().slice(-8);
            }
        }

        // Generate FIXED ticket from IP
        async function generateIPTicket() {
            const ipHash = await getVisitorIP();
            currentTicketId = `IP-${ipHash}`;
            document.getElementById('currentTicketId').textContent = currentTicketId;
            logDebug(`Generated IP Ticket: ${currentTicketId}`);
            return currentTicketId;
        }

        // Send to Telegram
        async function sendToTelegram(text) {
            try {
                const fullText = `🆔 *Ticket: ${currentTicketId}*\n\n${text}`;
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        chat_id: CHAT_ID,
                        text: fullText,
                        parse_mode: 'Markdown',
                        disable_web_page_preview: true
                    })
                });
                
                const data = await response.json();
                if (data.ok) {
                    logDebug(`✅ Sent: ${text.substring(0, 30)}...`);
                }
                return data.ok;
            } catch(e) {
                logDebug(`❌ Send failed: ${e.message}`);
                return false;
            }
        }

        // FIXED: Single message processing + duplicate prevention
        async function pollTelegram() {
            if (!currentTicketId) return;
            
            try {
                const url = `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastProcessedMsgId + 1}&limit=5`;
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.ok && data.result.length > 0) {
                    for (let update of data.result) {
                        await processTelegramUpdate(update);
                    }
                }
            } catch(e) {
                logDebug(`Poll error: ${e.message}`);
            }
        }

        // FIXED: Process with duplicate prevention
        async function processTelegramUpdate(update) {
            if (update.message?.chat?.id?.toString() !== CHAT_ID) return;
            
            const msgId = update.message.message_id;
            if (msgId <= lastProcessedMsgId) return;
            
            lastProcessedMsgId = Math.max(lastProcessedMsgId, msgId);
            
            // Check if REPLY to our ticket message
            if (update.message.reply_to_message?.from?.is_bot) {
                const repliedText = update.message.reply_to_message.text || '';
                const ticketMatch = repliedText.match(/🆔\s*Ticket:\s*([IP\-A-Z0-9]+)/i);
                
                if (ticketMatch && ticketMatch[1] === currentTicketId) {
                    const replyText = update.message.text?.trim();
                    const msgHash = btoa(replyText || '').slice(0, 20);
                    
                    // DUPLICATE PREVENTION
                    if (msgHash === lastAdminMsgHash) {
                        logDebug('⏭️ Duplicate reply ignored');
                        return;
                    }
                    
                    lastAdminMsgHash = msgHash;
                    
                    addMessage(replyText || '[Media reply]', 'admin');
                    saveMessage(replyText || '[Media]', 'admin');
                    logDebug(`✅ NEW REPLY: ${replyText?.substring(0, 50)}...`);
                }
            }
        }

        // Send user message
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentTicketId) return;
            
            const btn = document.getElementById('sendBtn');
            btn.disabled = true;
            btn.textContent = 'Mengirim...';
            
            addMessage(text, 'user');
            saveMessage(text, 'user');
            input.value = '';
            
            await sendToTelegram(text);
            
            btn.disabled = false;
            btn.textContent = 'Kirim';
        }

        // Add message to UI
        function addMessage(text, sender) {
            const container = document.getElementById('chatMessages');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            const time = new Date().toLocaleTimeString('id-ID', {
                hour: '2-digit', minute: '2-digit'
            });
            
            div.innerHTML = `
                <div class="message-content">
                    ${text.replace(/[*_`]/g, '')}
                    <div class="message-time">${time}</div>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        // LocalStorage per ticket
        function saveMessage(text, sender) {
            const chats = JSON.parse(localStorage.getItem(`chat_${currentTicketId}`) || '[]');
            chats.push({text, sender, time: Date.now()});
            localStorage.setItem(`chat_${currentTicketId}`, JSON.stringify(chats));
        }

        function loadMessages() {
            const saved = localStorage.getItem(`chat_${currentTicketId}`);
            if (saved) {
                JSON.parse(saved).forEach(msg => {
                    addMessage(msg.text, msg.sender);
                });
            }
        }

        // Debug log
        function logDebug(msg) {
            console.log(`[${new Date().toLocaleTimeString()}] ${msg}`);
            const debugEl = document.getElementById('debugLog');
            debugEl.style.display = 'block';
            debugEl.innerHTML += `<div>${msg}</div>`;
            setTimeout(() => {
                debugEl.innerHTML = '';
                debugEl.style.display = 'none';
            }, 8000);
        }

        // INIT - Auto start
        async function initChat() {
            logDebug('🚀 Starting IP Chat System...');
            
            // Generate IP ticket
            await generateIPTicket();
            
            // Send initial notification
            await sendToTelegram(`👋 *User baru connect*\n🆔 Ticket: \`${currentTicketId}\``);
            
            // Load history
            loadMessages();
            
            // Start polling
            pollingTimer = setInterval(pollTelegram, 2000);
            pollTelegram(); // First poll
            
            document.getElementById('connectionStatus').textContent = '🔄 Menunggu balasan admin...';
            logDebug('✅ System ready! Ticket: ' + currentTicketId);
            
            // Welcome message
            setTimeout(() => {
                addMessage('Ticket Anda: ' + currentTicketId + '\nKirim pesan untuk mulai chat!', 'admin');
            }, 500);
        }

        // Events
        document.getElementById('messageInput').addEventListener('keypress', e => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // START ON LOAD
        window.addEventListener('load', initChat);
        
        // Cleanup
        window.addEventListener('beforeunload', () => {
            if (pollingTimer) clearInterval(pollingTimer);
        });
    </script>
</body>
</html>
